<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    /* ── Data ── */

    const MARKETS = {
      us: {
        flag: "🇺🇸", name: "美国", nameEn: "US",
        outbound: { landline: 0.014, mobile: 0.014 },
        inbound: { local: 0.0085, tollfree: 0.022 },
        numberRent: { local: 1.15, tollfree: 2.15 },
        surcharge: { unanswered: 0.015, threshold: 0.2, lowDuration: 0.01 },
        outLabelFn: (dest) => `美国 Local 号 → 美国${dest === "mobile" ? "手机" : "固话"}`,
        inLabel: { local: "候选人回拨 → 美国 Local 号", tollfree: "候选人回拨 → 美国 Toll-free 号" },
        outNote: "⚠️ 美国独有 Surcharge：未接通率≥20%、短呼(≤6s)占比≥20%、均时长<30s 会触发额外费用",
        inNote: "Toll-free 接听费 2.6× Local",
      },
      uk: {
        flag: "🇬🇧", name: "英国", nameEn: "UK",
        outbound: { landline: 0.0158, mobile: 0.0305 },
        inbound: { local: 0.01, tollfree: 0.0664 },
        numberRent: { local: 1.15, tollfree: 2.15 },
        surcharge: null,
        outLabelFn: (dest) => `英国 Local 号 → 英国${dest === "mobile" ? "手机" : "固话"}`,
        inLabel: { local: "候选人回拨 → 英国 Local 号", tollfree: "候选人回拨 → 英国 Toll-free 号" },
        outNote: "💡 英国可购 Mobile 主叫号码（$1.15/月，同 Local），来电显示为手机号，接通率可能更高",
        inNote: "Toll-free 接听费 6.6× Local",
      },
      jp: {
        flag: "🇯🇵", name: "日本", nameEn: "JP",
        outbound: { landline: 0.0746, mobile: 0.185 },
        inbound: { local: 0.01, tollfree: 0.278 },
        numberRent: { national: 4.5, local0ABJ: 20.0, tollfree: 25.0 },
        surcharge: null,
        outLabelFn: (dest, jpNum) => `日本 ${jpNum === "national" ? "National (050)" : "Local 0ABJ"} 号 → 日本${dest === "mobile" ? "手机" : "固话"}`,
        inLabel: { local: "候选人回拨 → 日本本地号", tollfree: "候选人回拨 → 日本 Toll-free 号" },
        outNote: "费率最高，手机 13.2× 美国",
        inNote: "Toll-free 接听费 27.8× Local",
      },
    };

    const ADDONS = {
      recording: { price: 0.0025, unit: "min", label: "通话录音" },
      mediaStreams: { price: 0.004, unit: "min", label: "Media Streams" },
      amd: { price: 0.0075, unit: "call", label: "留言检测 AMD" },
      conversationRelay: { price: 0.07, unit: "min", label: "ConversationRelay" },
    };

    const PRESETS = {
      pilot: { label: "试运营", desc: "小规模验证", icon: "🧪", values: { monthlyOutbound: 2000, avgDuration: 2, answerRate: 35, numberPoolSize: 5 } },
      growth: { label: "增长期", desc: "日均千通级", icon: "📈", values: { monthlyOutbound: 25000, avgDuration: 2, answerRate: 40, numberPoolSize: 25 } },
      scale: { label: "规模化", desc: "10万+月呼出", icon: "🚀", values: { monthlyOutbound: 100000, avgDuration: 2, answerRate: 45, numberPoolSize: 80 } },
      custom: { label: "自定义", desc: "手动设置", icon: "✏️", values: null },
    };

    const fmtUSD = (n) => {
      if (n >= 1000) return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (n >= 1) return "$" + n.toFixed(2);
      return "$" + n.toFixed(4);
    };

    function useIsMobile() {
      const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1024);
      useEffect(() => {
        const h = () => setW(window.innerWidth);
        window.addEventListener("resize", h);
        return () => window.removeEventListener("resize", h);
      }, []);
      return w < 768;
    }

    /* ── UI Primitives ── */

    function NumInput({ label, value, onChange, unit, min = 0, max = 999999, step = 1, hint }) {
      const [local, setLocal] = useState(String(value));
      useEffect(() => { setLocal(String(value)); }, [value]);
      const commit = (v) => { const n = parseFloat(v); if (!isNaN(n)) onChange(Math.max(min, Math.min(max, n))); else setLocal(String(value)); };
      return (
        <div className="mb-3">
          <div className="text-xs text-slate-600 mb-1 font-medium">{label}</div>
          <div className="flex items-center gap-1.5">
            <button onClick={() => commit(value - step)} className="w-8 h-8 rounded-lg border border-slate-300 bg-white text-slate-500 text-base font-semibold flex items-center justify-center shrink-0 cursor-pointer hover:bg-slate-50">−</button>
            <div className="relative flex-1">
              <input type="text" inputMode="decimal" value={local}
                onChange={(e) => setLocal(e.target.value)}
                onBlur={(e) => commit(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && commit(e.target.value)}
                className="w-full h-8 rounded-lg border border-slate-300 bg-white text-slate-900 text-sm font-semibold text-center outline-none tabular-nums px-7 focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400" />
              {unit && <span className="absolute right-2.5 top-1/2 -translate-y-1/2 text-xs text-slate-400 pointer-events-none">{unit}</span>}
            </div>
            <button onClick={() => commit(value + step)} className="w-8 h-8 rounded-lg border border-slate-300 bg-white text-slate-500 text-base font-semibold flex items-center justify-center shrink-0 cursor-pointer hover:bg-slate-50">+</button>
          </div>
          {hint && <div className="text-[11px] text-slate-400 mt-0.5">{hint}</div>}
        </div>
      );
    }

    function Chip({ label, active, onClick, icon, desc, compact }) {
      return (
        <button onClick={onClick} className={`rounded-xl border-[1.5px] cursor-pointer text-[13px] font-medium transition-all flex-1 text-left ${compact ? 'py-1.5 px-3 flex-row items-center gap-1.5' : 'py-2 px-3 flex-col items-start gap-0.5'} flex ${active ? 'border-indigo-500 bg-indigo-50 text-indigo-600' : 'border-slate-200 bg-white text-slate-500 hover:border-slate-300'}`}>
          {icon && <span className={compact ? 'text-sm' : 'text-base'}>{icon}</span>}
          <div>
            <div className="font-semibold text-[13px]">{label}</div>
            {desc && !compact && <div className="text-[10px] text-slate-400 mt-0.5">{desc}</div>}
          </div>
        </button>
      );
    }

    /* ── Outbound Card ── */

    function OutboundCard({ market, result, tag, destType, jpNumberType, marketKey }) {
      const tagStyle = tag === "最低" ? "text-emerald-600 border-emerald-500 bg-emerald-50" : tag === "最高" ? "text-red-600 border-red-500 bg-red-50" : "";
      const borderColor = tag === "最低" ? "border-emerald-500" : tag === "最高" ? "border-red-500" : "border-slate-200";
      const linkLabel = market.outLabelFn(destType, jpNumberType);
      const accentColor = marketKey === 'us' ? 'bg-emerald-500' : marketKey === 'uk' ? 'bg-indigo-500' : 'bg-amber-500';
      return (
        <div className={`bg-white rounded-xl border-[1.5px] ${borderColor} overflow-hidden flex-1 min-w-0 relative shadow-md`}>
          <div className={`h-1 ${accentColor}`} />
          {tag && (
            <div className={`absolute top-3 right-4 px-2 py-0.5 rounded text-[10px] font-semibold border ${tagStyle}`}>{tag}成本</div>
          )}
          <div className="p-4">
            <div className="flex items-center gap-2 mb-1">
              <span className="text-2xl">{market.flag}</span>
              <div className="text-[15px] font-bold text-slate-900">拨打{market.name}候选人</div>
            </div>
            <div className="text-[11px] text-slate-400 mb-4 pl-9">{linkLabel}</div>

            <div className="mb-3">
              <div className="text-[10px] text-slate-500 uppercase tracking-wide mb-0.5">每通</div>
              <div className="text-[22px] font-bold text-slate-900 tabular-nums leading-tight">{fmtUSD(result.perCallTotal)}</div>
            </div>
            <div className="mb-3">
              <div className="text-[10px] text-slate-500 uppercase tracking-wide mb-0.5">每分钟</div>
              <div className="text-[17px] font-semibold text-slate-900 tabular-nums">{fmtUSD(result.perMinuteTotal)}<span className="text-xs text-slate-400">/min</span></div>
            </div>
            <div className="border-t border-slate-100 pt-3 mb-2">
              <div className="text-[10px] text-slate-500 uppercase tracking-wide mb-0.5">月度总计</div>
              <div className="text-[19px] font-bold text-slate-900 tabular-nums">{fmtUSD(result.monthlyTotal)}</div>
            </div>
            <div className="border-t border-slate-100 pt-2">
              {result.breakdown.map((item, i) => (
                <div key={i} className="flex justify-between mb-0.5 text-xs">
                  <span className="text-slate-500">{item.label}</span>
                  <span className="text-slate-600 tabular-nums">{fmtUSD(item.value)}</span>
                </div>
              ))}
            </div>
            {result.surchargeApplied && (
              <div className="mt-2 p-2 bg-red-50 rounded-lg border border-red-200">
                <div className="text-[11px] text-red-600 font-semibold">⚠️ Surcharge 触发</div>
                {result.surchargeDetails.map((s, i) => <div key={i} className="text-[11px] text-red-500 mt-0.5">{s}</div>)}
              </div>
            )}
            {market.outNote && <div className="mt-2 text-[11px] text-slate-400 italic">{market.outNote}</div>}
          </div>
        </div>
      );
    }

    /* ── Inbound Card ── */

    function InboundCard({ market, result, tag, inNumType, marketKey }) {
      const tagStyle = tag === "最低" ? "text-emerald-600 border-emerald-500 bg-emerald-50" : tag === "最高" ? "text-red-600 border-red-500 bg-red-50" : "";
      const borderColor = tag === "最低" ? "border-emerald-500" : tag === "最高" ? "border-red-500" : "border-slate-200";
      const linkLabel = market.inLabel[inNumType] || market.inLabel.local;
      const accentColor = marketKey === 'us' ? 'bg-emerald-500' : marketKey === 'uk' ? 'bg-indigo-500' : 'bg-amber-500';
      return (
        <div className={`bg-white rounded-xl border-[1.5px] ${borderColor} overflow-hidden flex-1 min-w-0 relative shadow-md`}>
          <div className={`h-1 ${accentColor}`} />
          {tag && (
            <div className={`absolute top-3 right-4 px-2 py-0.5 rounded text-[10px] font-semibold border ${tagStyle}`}>{tag}成本</div>
          )}
          <div className="p-4">
            <div className="flex items-center gap-2 mb-1">
              <span className="text-2xl">{market.flag}</span>
              <div className="text-[15px] font-bold text-slate-900">{market.name}候选人回拨</div>
            </div>
            <div className="text-[11px] text-slate-400 mb-4 pl-9">{linkLabel}</div>

            <div className="mb-3">
              <div className="text-[10px] text-slate-500 uppercase tracking-wide mb-0.5">每通</div>
              <div className="text-[22px] font-bold text-slate-900 tabular-nums leading-tight">{fmtUSD(result.perCallTotal)}</div>
            </div>
            <div className="mb-3">
              <div className="text-[10px] text-slate-500 uppercase tracking-wide mb-0.5">每分钟</div>
              <div className="text-[17px] font-semibold text-slate-900 tabular-nums">{fmtUSD(result.perMinuteTotal)}<span className="text-xs text-slate-400">/min</span></div>
            </div>
            <div className="border-t border-slate-100 pt-3 mb-2">
              <div className="text-[10px] text-slate-500 uppercase tracking-wide mb-0.5">月度总计</div>
              <div className="text-[19px] font-bold text-slate-900 tabular-nums">{fmtUSD(result.monthlyTotal)}</div>
            </div>
            <div className="border-t border-slate-100 pt-2">
              {result.breakdown.map((item, i) => (
                <div key={i} className="flex justify-between mb-0.5 text-xs">
                  <span className="text-slate-500">{item.label}</span>
                  <span className="text-slate-600 tabular-nums">{fmtUSD(item.value)}</span>
                </div>
              ))}
            </div>
            {market.inNote && <div className="mt-2 text-[11px] text-slate-400 italic">{market.inNote}</div>}
          </div>
        </div>
      );
    }

    /* ── Main ── */

    function CostSimulator() {
      const isMobile = useIsMobile();
      const [preset, setPreset] = useState("growth");
      const [monthlyOutbound, setMonthlyOutbound] = useState(25000);
      const [avgDuration, setAvgDuration] = useState(2);
      const [answerRate, setAnswerRate] = useState(40);
      const [destType, setDestType] = useState("mobile");
      const [numberPoolSize, setNumberPoolSize] = useState(25);
      const [jpNumberType, setJpNumberType] = useState("national");
      const [addons, setAddons] = useState({ recording: true, mediaStreams: true, amd: true, conversationRelay: false });
      const [showPanel, setShowPanel] = useState("results");
      const [paramsExpanded, setParamsExpanded] = useState(false);
      const [direction, setDirection] = useState("outbound");
      const [shortCallRate, setShortCallRate] = useState(10);
      const [inNumType, setInNumType] = useState("local");
      const [inMonthly, setInMonthly] = useState(3000);
      const [inAvgDuration, setInAvgDuration] = useState(2);

      const applyPreset = (key) => {
        setPreset(key);
        const p = PRESETS[key];
        if (p.values) {
          setMonthlyOutbound(p.values.monthlyOutbound);
          setAvgDuration(p.values.avgDuration);
          setAnswerRate(p.values.answerRate);
          setNumberPoolSize(p.values.numberPoolSize);
        }
      };
      const editAndCustomize = (setter) => (v) => { setter(v); setPreset("custom"); };

      const paramsSummary = useMemo(() => {
        if (direction === "outbound") {
          const presetLabel = PRESETS[preset]?.label || "自定义";
          const destLabel = destType === "mobile" ? "手机" : "固话";
          return {
            title: `外呼 · ${presetLabel}`,
            detail: `每月${monthlyOutbound.toLocaleString()}通 · ${avgDuration}min时长 · ${answerRate}%接通 · ${destLabel}`
          };
        } else {
          const numLabel = inNumType === "local" ? "Local" : "Toll-free";
          return {
            title: "回拨场景",
            detail: `每月${inMonthly.toLocaleString()}通 · ${inAvgDuration}min时长 · ${numLabel}`
          };
        }
      }, [direction, preset, monthlyOutbound, avgDuration, answerRate, destType, inMonthly, inAvgDuration, inNumType]);

      /* ── Outbound calc ── */
      const outResults = useMemo(() => {
        const res = {};
        Object.entries(MARKETS).forEach(([key, market]) => {
          const answered = Math.round(monthlyOutbound * (answerRate / 100));
          const unanswered = monthlyOutbound - answered;
          const billedMin = answered * Math.ceil(avgDuration);
          const outRate = destType === "mobile" ? market.outbound.mobile : market.outbound.landline;
          const breakdown = [];
          breakdown.push({ label: "通话费", value: Math.ceil(avgDuration) * outRate });

          let addonPerCall = 0;
          Object.entries(ADDONS).forEach(([ak, ad]) => {
            if (addons[ak]) {
              const v = ad.unit === "min" ? Math.ceil(avgDuration) * ad.price : ad.price;
              addonPerCall += v;
              breakdown.push({ label: ad.label, value: v });
            }
          });

          let rent;
          if (key === "jp") rent = jpNumberType === "national" ? market.numberRent.national : market.numberRent.local0ABJ;
          else rent = market.numberRent.local;
          const totalRent = numberPoolSize * rent;
          const rentPerCall = answered > 0 ? totalRent / answered : 0;
          breakdown.push({ label: `号码月租(${numberPoolSize}个)`, value: rentPerCall });

          let surchargeCost = 0, surchargeApplied = false, surchargeDetails = [];
          if (key === "us" && market.surcharge) {
            const unRate = unanswered / monthlyOutbound;
            if (unRate >= market.surcharge.threshold) {
              surchargeApplied = true;
              const c = unanswered * market.surcharge.unanswered;
              surchargeCost += c;
              surchargeDetails.push(`未接通率${(unRate * 100).toFixed(0)}%≥20%: +${fmtUSD(c)}/月`);
            }
            if (shortCallRate >= 20) {
              surchargeApplied = true;
              const shortCalls = Math.round(answered * (shortCallRate / 100));
              const c = shortCalls * market.surcharge.unanswered;
              surchargeCost += c;
              surchargeDetails.push(`短呼(≤6s)占比${shortCallRate}%≥20%: +${fmtUSD(c)}/月`);
            }
            if (avgDuration < 0.5) {
              surchargeApplied = true;
              const c = billedMin * market.surcharge.lowDuration;
              surchargeCost += c;
              surchargeDetails.push(`均时长<30s: +${fmtUSD(c)}/月`);
            }
          }
          const surchargePerCall = answered > 0 ? surchargeCost / answered : 0;
          if (surchargeCost > 0) breakdown.push({ label: "⚠️ Surcharge", value: surchargePerCall });

          const perCall = Math.ceil(avgDuration) * outRate + addonPerCall + rentPerCall + surchargePerCall;
          const perMin = Math.ceil(avgDuration) > 0 ? perCall / Math.ceil(avgDuration) : 0;
          const monthly = billedMin * outRate + answered * addonPerCall + totalRent + surchargeCost;

          res[key] = { perCallTotal: perCall, perMinuteTotal: perMin, monthlyTotal: monthly, breakdown, surchargeApplied, surchargeDetails, answered, unanswered, billedMin };
        });
        return res;
      }, [monthlyOutbound, avgDuration, answerRate, destType, numberPoolSize, jpNumberType, addons, shortCallRate]);

      /* ── Inbound calc ── */
      const inResults = useMemo(() => {
        const res = {};
        Object.entries(MARKETS).forEach(([key, market]) => {
          const calls = inMonthly;
          const billedMin = calls * Math.ceil(inAvgDuration);
          const inRate = market.inbound[inNumType] || market.inbound.local;
          const breakdown = [];
          breakdown.push({ label: "接听费", value: Math.ceil(inAvgDuration) * inRate });

          let addonPerCall = 0;
          Object.entries(ADDONS).forEach(([ak, ad]) => {
            if (!addons[ak]) return;
            if (ak === "amd") return;
            const v = ad.unit === "min" ? Math.ceil(inAvgDuration) * ad.price : ad.price;
            addonPerCall += v;
            breakdown.push({ label: ad.label, value: v });
          });

          let rent;
          if (inNumType === "tollfree") {
            rent = market.numberRent.tollfree;
          } else {
            if (key === "jp") rent = jpNumberType === "national" ? market.numberRent.national : market.numberRent.local0ABJ;
            else rent = market.numberRent.local;
          }
          const totalRent = numberPoolSize * rent;
          const rentPerCall = calls > 0 ? totalRent / calls : 0;
          breakdown.push({ label: `号码月租(${numberPoolSize}个)`, value: rentPerCall });

          const perCall = Math.ceil(inAvgDuration) * inRate + addonPerCall + rentPerCall;
          const perMin = Math.ceil(inAvgDuration) > 0 ? perCall / Math.ceil(inAvgDuration) : 0;
          const monthly = billedMin * inRate + calls * addonPerCall + totalRent;

          res[key] = { perCallTotal: perCall, perMinuteTotal: perMin, monthlyTotal: monthly, breakdown, calls, billedMin };
        });
        return res;
      }, [inMonthly, inAvgDuration, inNumType, numberPoolSize, jpNumberType, addons]);

      const activeResults = direction === "outbound" ? outResults : inResults;
      const totals = Object.entries(activeResults).map(([k, v]) => ({ key: k, total: v.perCallTotal }));
      const maxKey = totals.reduce((a, b) => (a.total > b.total ? a : b)).key;
      const minKey = totals.reduce((a, b) => (a.total < b.total ? a : b)).key;
      const maxPerMin = Math.max(...Object.values(activeResults).map((r) => r.perMinuteTotal));

      /* ── 参数面板 ── */
      const controlsPanel = (
        <div className={isMobile ? "space-y-6" : "grid grid-cols-4 gap-6 items-start"}>
          {direction === "outbound" && (
            <div>
              <div className="text-[11px] text-indigo-600 uppercase tracking-widest mb-3 font-semibold">场景预设</div>
              <div className="grid grid-cols-2 gap-2">
                {Object.entries(PRESETS).map(([key, p]) => (
                  <Chip key={key} label={p.label} desc={p.desc} icon={p.icon} active={preset === key} onClick={() => applyPreset(key)} />
                ))}
              </div>
            </div>
          )}

          <div>
            <div className="text-[11px] text-indigo-600 uppercase tracking-widest mb-3 font-semibold">
              {direction === "outbound" ? "外呼参数" : "回拨参数"}
            </div>
            {direction === "outbound" ? (
              <div className="space-y-3">
                <NumInput label="月外呼总量" value={monthlyOutbound} onChange={editAndCustomize(setMonthlyOutbound)} unit="通" min={100} max={500000} step={1000} />
                <NumInput label="平均通话时长" value={avgDuration} onChange={editAndCustomize(setAvgDuration)} unit="min" min={0.1} max={30} step={0.5} hint="计费向上取整到整分钟" />
                <NumInput label="接通率" value={answerRate} onChange={editAndCustomize(setAnswerRate)} unit="%" min={1} max={99} step={1} hint="招聘外呼一般 30%-50%" />
                <NumInput label="短呼占比（≤6s）" value={shortCallRate} onChange={editAndCustomize(setShortCallRate)} unit="%" min={0} max={100} step={1} hint="≥20% 会触发美国 Surcharge" />
              </div>
            ) : (
              <div className="space-y-3">
                <NumInput label="月回拨来电量" value={inMonthly} onChange={setInMonthly} unit="通" min={100} max={200000} step={500} hint="预估候选人回拨量" />
                <NumInput label="平均通话时长" value={inAvgDuration} onChange={setInAvgDuration} unit="min" min={0.5} max={30} step={0.5} hint="计费向上取整到整分钟" />
              </div>
            )}
          </div>

          <div>
            <div className="text-[11px] text-indigo-600 uppercase tracking-widest mb-3 font-semibold">号码池</div>
            <div className="space-y-3">
              <NumInput label="号码数量" value={numberPoolSize} onChange={editAndCustomize(setNumberPoolSize)} unit="个" min={1} max={200} step={1}
                hint={`日容量约 ${(numberPoolSize * 50).toLocaleString()} 通`} />
              {direction === "outbound" && (
                <div>
                  <div className="text-xs text-slate-600 mb-2 font-medium">被叫号码类型</div>
                  <div className="flex gap-2">
                    <button onClick={() => setDestType("mobile")} className={`flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-all ${destType === "mobile" ? 'bg-indigo-100 text-indigo-700 border border-indigo-300' : 'bg-white text-slate-600 border border-slate-200 hover:border-slate-300'}`}>📱 手机</button>
                    <button onClick={() => setDestType("landline")} className={`flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-all ${destType === "landline" ? 'bg-indigo-100 text-indigo-700 border border-indigo-300' : 'bg-white text-slate-600 border border-slate-200 hover:border-slate-300'}`}>☎️ 固话</button>
                  </div>
                </div>
              )}
              {direction === "inbound" && (
                <div>
                  <div className="text-xs text-slate-600 mb-2 font-medium">接听号码类型</div>
                  <div className="flex gap-2">
                    <button onClick={() => setInNumType("local")} className={`flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-all ${inNumType === "local" ? 'bg-indigo-100 text-indigo-700 border border-indigo-300' : 'bg-white text-slate-600 border border-slate-200 hover:border-slate-300'}`}>Local</button>
                    <button onClick={() => setInNumType("tollfree")} className={`flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-all ${inNumType === "tollfree" ? 'bg-indigo-100 text-indigo-700 border border-indigo-300' : 'bg-white text-slate-600 border border-slate-200 hover:border-slate-300'}`}>Toll-free</button>
                  </div>
                </div>
              )}
              {(direction === "outbound" || (direction === "inbound" && inNumType === "local")) && (
                <div>
                  <div className="text-xs text-slate-600 mb-2 font-medium">日本号码类型</div>
                  <div className="flex gap-2">
                    <button onClick={() => setJpNumberType("national")} className={`flex-1 py-2 px-2 rounded-lg text-xs font-medium transition-all ${jpNumberType === "national" ? 'bg-indigo-100 text-indigo-700 border border-indigo-300' : 'bg-white text-slate-600 border border-slate-200 hover:border-slate-300'}`}>National $4.5/月</button>
                    <button onClick={() => setJpNumberType("local0ABJ")} className={`flex-1 py-2 px-2 rounded-lg text-xs font-medium transition-all ${jpNumberType === "local0ABJ" ? 'bg-indigo-100 text-indigo-700 border border-indigo-300' : 'bg-white text-slate-600 border border-slate-200 hover:border-slate-300'}`}>0ABJ $20/月</button>
                  </div>
                </div>
              )}
            </div>
          </div>

          <div>
            <div className="text-[11px] text-indigo-600 uppercase tracking-widest mb-3 font-semibold">附加服务</div>
            <div className="space-y-3">
              {Object.entries(ADDONS).map(([k, ad]) => (
                <label key={k} className="flex items-center gap-2.5 cursor-pointer"
                  onClick={(e) => { e.preventDefault(); setAddons((p) => ({ ...p, [k]: !p[k] })); }}>
                  <div className={`w-11 h-6 rounded-full shrink-0 relative transition-colors ${addons[k] ? 'bg-indigo-500' : 'bg-slate-300'}`}>
                    <div className={`w-5 h-5 rounded-full bg-white absolute top-0.5 left-0.5 transition-transform shadow-sm ${addons[k] ? 'translate-x-5' : 'translate-x-0'}`} />
                  </div>
                  <div className="flex-1 min-w-0 text-xs">
                    <span className="text-slate-700">{ad.label}</span>
                    <span className="text-slate-400 ml-1">({fmtUSD(ad.price)}/{ad.unit === "min" ? "min" : "通"})</span>
                  </div>
                </label>
              ))}
            </div>
          </div>
        </div>
      );

      /* ── 结果面板 ── */
      const resultsPanel = (
        <>
          <div className={`grid ${isMobile ? 'grid-cols-1 gap-4' : 'grid-cols-3 gap-4'} mb-4`}>
            {Object.entries(MARKETS).map(([key, market]) =>
              direction === "outbound" ? (
                <OutboundCard key={key} market={market} result={outResults[key]}
                  destType={destType} jpNumberType={jpNumberType} marketKey={key}
                  tag={key === minKey ? "最低" : key === maxKey ? "最高" : null} />
              ) : (
                <InboundCard key={key} market={market} result={inResults[key]}
                  inNumType={inNumType} marketKey={key}
                  tag={key === minKey ? "最低" : key === maxKey ? "最高" : null} />
              )
            )}
          </div>

          <div className="bg-white rounded-xl border-[1.5px] border-slate-200 overflow-hidden shadow-md">
            <div className="h-1 bg-gradient-to-r from-emerald-500 via-indigo-500 to-amber-500" />
            <div className="p-4">
              <div className="text-[11px] text-indigo-600 uppercase tracking-widest mb-3 font-semibold">
                {direction === "outbound" ? "每分钟外呼成本对比" : "每分钟接听成本对比"}
              </div>
              {Object.entries(activeResults).map(([key, r]) => (
                <div key={key} className="mb-3 last:mb-0">
                  <div className="flex justify-between mb-1 text-[13px]">
                    <span className="text-slate-600">{MARKETS[key].flag} {MARKETS[key].name}</span>
                    <span className="text-slate-900 font-semibold tabular-nums">{fmtUSD(r.perMinuteTotal)}/min</span>
                  </div>
                  <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                    <div 
                      className={`h-full rounded-full transition-all duration-500 ${key === 'us' ? 'bg-emerald-500' : key === 'uk' ? 'bg-indigo-500' : 'bg-amber-500'}`} 
                      style={{ width: (maxPerMin > 0 ? (r.perMinuteTotal / maxPerMin) * 100 : 0) + "%" }} 
                    />
                  </div>
                </div>
              ))}
            </div>
          </div>
        </>
      );

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 font-sans">
          <div className="max-w-6xl mx-auto px-6 pt-6 pb-4">
            <h1 className="text-2xl font-bold text-slate-900">Twilio 通话费用模拟器</h1>
            <p className="text-xs text-slate-500 mt-1">美国 / 英国 / 日本 · Outbound & Inbound 成本对比</p>
          </div>

          <div className="max-w-6xl mx-auto px-6 pb-4">
            <div className="inline-flex bg-slate-200/70 rounded-2xl p-1.5 gap-1">
              {[
                { key: "outbound", label: "Outbound 外呼", sub: "主动拨打候选人", icon: "📤" },
                { key: "inbound", label: "Inbound 回拨", sub: "候选人回拨接听", icon: "📥" },
              ].map((d) => (
                <button 
                  key={d.key} 
                  onClick={() => setDirection(d.key)} 
                  className={`py-3 px-6 rounded-xl transition-all cursor-pointer min-w-[180px] ${
                    direction === d.key 
                      ? 'bg-white text-slate-900 shadow-md' 
                      : 'bg-transparent text-slate-500 hover:text-slate-700'
                  }`}
                >
                  <div className="flex items-center justify-center gap-2">
                    <span className="text-base">{d.icon}</span>
                    <span className="text-[13px] font-semibold">{d.label}</span>
                  </div>
                  <div className={`text-[11px] text-center mt-1 ${direction === d.key ? 'text-slate-500' : 'text-slate-400'}`}>{d.sub}</div>
                </button>
              ))}
            </div>
          </div>

          {!isMobile && (
            <div className="max-w-6xl mx-auto px-6 pb-4">
              <div 
                onClick={() => setParamsExpanded(!paramsExpanded)}
                className="flex items-center justify-between bg-gradient-to-r from-slate-50 to-indigo-50/50 border border-slate-200 rounded-xl px-4 py-3 cursor-pointer hover:border-indigo-200 transition-all shadow-sm"
              >
                <div className="flex items-center gap-3 text-sm">
                  <span className="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center text-indigo-600">⚙️</span>
                  <span className="font-semibold text-slate-900">{paramsSummary.title}</span>
                  <span className="text-slate-300">|</span>
                  <span className="text-slate-600">{paramsSummary.detail}</span>
                </div>
                <button className="text-xs text-indigo-600 font-medium hover:text-indigo-700 flex items-center gap-1 px-3 py-1.5 rounded-lg hover:bg-indigo-50 transition-colors">
                  {paramsExpanded ? "收起" : "调整"}
                  <svg className={`w-4 h-4 transition-transform ${paramsExpanded ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                  </svg>
                </button>
              </div>

              {paramsExpanded && (
                <div className="mt-3 bg-slate-100/70 rounded-2xl p-5 border border-slate-200">
                  {controlsPanel}
                </div>
              )}
            </div>
          )}

          {isMobile && (
            <>
              <div className="mx-6 mb-3 bg-gradient-to-r from-slate-50 to-indigo-50/50 border border-slate-200 rounded-xl px-4 py-2.5 shadow-sm">
                <div className="text-xs text-indigo-600 font-medium">{paramsSummary.title}</div>
                <div className="text-sm text-slate-700 mt-0.5">{paramsSummary.detail}</div>
              </div>
              <div className="flex px-6 mb-3 border-b border-slate-200">
                {[{ key: "results", label: "📊 结果" }, { key: "controls", label: "⚙️ 参数" }].map((tab) => (
                  <button key={tab.key} onClick={() => setShowPanel(tab.key)} className={`flex-1 py-2.5 text-sm font-semibold cursor-pointer ${showPanel === tab.key ? 'border-b-2 border-indigo-500 text-indigo-600' : 'text-slate-400'}`}>{tab.label}</button>
                ))}
              </div>
            </>
          )}

          <div className="max-w-6xl mx-auto px-6 pb-10">
            {isMobile ? (
              showPanel === "controls" ? (
                <div className="bg-slate-100/70 rounded-2xl p-4">
                  {controlsPanel}
                </div>
              ) : resultsPanel
            ) : (
              resultsPanel
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CostSimulator />);
  </script>
</body>
</html>
